<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Yet Another Theory of Programming</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    overflow: hidden;
    touch-action: pan-y;
    transition: background 0.3s;
  }

  body.dark {
    background: #1a1a1a;
  }

  #viewer {
    position: relative;
    width: 100vw;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #page {
    max-width: 100vw;
    max-height: 100dvh;
    width: auto;
    height: 100dvh;
    display: block;
    transition: opacity 0.08s ease;
  }

  body.dark #page {
    filter: invert(0.88) hue-rotate(180deg);
  }

  /* Invisible click zones on left/right edges */
  .zone {
    position: fixed;
    top: 0;
    width: 25%;
    height: 100%;
    cursor: pointer;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
  }
  .zone-prev { left: 0; }
  .zone-next { right: 0; }

  /* Brief page flash on rapid flip */
  #page.flipping {
    opacity: 0.7;
  }

  /* Minimal page indicator — fades in/out */
  #indicator {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font: 13px/1 system-ui, sans-serif;
    color: #999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 20;
  }
  #indicator.visible { opacity: 1; }
  body.dark #indicator { color: #666; }

  /* Loading state */
  #page.loading {
    opacity: 0.3;
  }
</style>
</head>
<body>

<div id="viewer">
  <img id="page" alt="page">
</div>

<div class="zone zone-prev" id="zone-prev"></div>
<div class="zone zone-next" id="zone-next"></div>

<div id="indicator"></div>

<script>
(function () {
  const NAME = 'Y-A-T-P';
  const TOTAL = 6;
  const MOBILE_TOTAL = 6;

  const cache = {};
  const pageEl = document.getElementById('page');
  const indicator = document.getElementById('indicator');
  let current = 1;
  let indicatorTimer = null;

  // --- Device/orientation detection ---
  function useMobile() {
    // Mobile portrait: use mobile SVGs
    // Mobile landscape or desktop: use desktop SVGs
    var w = window.innerWidth;
    var h = window.innerHeight;
    // Consider mobile if narrow (< 820px) AND portrait
    return w < 820 && h > w;
  }

  function activeTotal() {
    return useMobile() ? MOBILE_TOTAL : TOTAL;
  }

  // --- Page URL ---
  function pageUrl(n) {
    if (useMobile()) {
      return NAME + '-m' + n + '.svg';
    }
    return NAME + '-' + n + '.svg';
  }

  // --- Preload a page into cache ---
  function preload(n) {
    var total = activeTotal();
    if (n < 1 || n > total) return;
    var url = pageUrl(n);
    if (cache[url]) return;
    var img = new Image();
    img.src = url;
    cache[url] = img;
  }

  // --- Show page ---
  function show(n) {
    var total = activeTotal();
    if (n < 1 || n > total) return;
    current = n;

    // Update URL hash without scrolling
    history.replaceState(null, '', '#' + n);

    var url = pageUrl(n);

    // If cached and loaded, instant swap
    if (cache[url] && cache[url].complete) {
      pageEl.src = cache[url].src;
      pageEl.classList.remove('loading');
    } else {
      // Not yet cached — load it now
      pageEl.classList.add('loading');
      preload(n);
      cache[url].onload = function () {
        if (current === n) {
          pageEl.src = cache[url].src;
          pageEl.classList.remove('loading');
        }
      };
    }

    // Brief flipping feedback for rapid taps
    pageEl.classList.add('flipping');
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        pageEl.classList.remove('flipping');
      });
    });

    // Show indicator briefly
    indicator.textContent = n + ' / ' + total;
    indicator.classList.add('visible');
    clearTimeout(indicatorTimer);
    indicatorTimer = setTimeout(function () {
      indicator.classList.remove('visible');
    }, 1200);

    // Preload adjacent pages
    preload(n - 1);
    preload(n + 1);
    // Also preload one further ahead for rapid flipping
    preload(n + 2);
  }

  function prev() { show(current - 1); }
  function next() { show(current + 1); }

  // --- Keyboard ---
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault();
      prev();
    } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault();
      next();
    } else if (e.key === 'Home') {
      e.preventDefault();
      show(1);
    } else if (e.key === 'End') {
      e.preventDefault();
      show(activeTotal());
    } else if (e.key === 'd') {
      document.body.classList.toggle('dark');
    }
  });

  // --- Click zones ---
  document.getElementById('zone-prev').addEventListener('click', prev);
  document.getElementById('zone-next').addEventListener('click', next);

  // --- Touch/swipe ---
  let touchStartX = 0;
  let touchStartY = 0;
  document.addEventListener('touchstart', function (e) {
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', function (e) {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    // Only trigger if horizontal swipe is dominant and > 50px
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0) next();
      else prev();
    }
  }, { passive: true });

  // --- Double-tap center to toggle dark mode (mobile) ---
  let lastTap = 0;
  document.addEventListener('touchend', function (e) {
    var x = e.changedTouches[0].clientX;
    var w = window.innerWidth;
    // Only in the center 50% (between the nav zones)
    if (x < w * 0.25 || x > w * 0.75) return;
    var now = Date.now();
    if (now - lastTap < 300) {
      document.body.classList.toggle('dark');
      lastTap = 0;
    } else {
      lastTap = now;
    }
  }, { passive: true });

  // --- Orientation change: reload current page with correct SVG set ---
  window.addEventListener('resize', function () {
    // Clamp current page to new total if switching sets
    var total = activeTotal();
    if (current > total) current = total;
    show(current);
  });

  // --- Hash navigation ---
  function readHash() {
    const h = parseInt(location.hash.replace('#', ''), 10);
    var total = activeTotal();
    return (h >= 1 && h <= total) ? h : 1;
  }

  window.addEventListener('hashchange', function () {
    show(readHash());
  });

  // --- Init ---
  current = readHash();
  preload(current);
  var initUrl = pageUrl(current);
  cache[initUrl].onload = function () {
    show(current);
  };
  // If already cached (e.g., browser cache), show immediately
  if (cache[initUrl] && cache[initUrl].complete) {
    show(current);
  }
})();
</script>

</body>
</html>
