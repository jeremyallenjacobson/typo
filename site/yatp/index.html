<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Yet Another Theory of Programming</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    overflow: hidden;
  }

  #viewer {
    width: 100vw;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #page {
    height: 100dvh;
    width: auto;
    display: block;
    filter: invert(0.88) hue-rotate(180deg);
    pointer-events: none;
  }

  @media (max-width: 820px) and (orientation: portrait) {
    #page {
      width: 100vw;
      height: auto;
    }
  }

  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
  }

  #indicator {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font: 14px/1 system-ui, sans-serif;
    color: #666;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  #indicator.visible { opacity: 1; }

  #rotate-msg {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a1a;
    color: #666;
    font: 16px/1.4 system-ui, sans-serif;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 200;
  }

  @media (max-width: 820px) and (orientation: landscape) {
    #rotate-msg { display: flex; }
    #viewer, #overlay, #indicator { display: none; }
  }
</style>
</head>
<body>

<div id="viewer">
  <object id="page" type="image/svg+xml"></object>
</div>

<div id="overlay"></div>
<div id="indicator"></div>
<div id="rotate-msg">Rotate to portrait</div>

<script>
(function () {
  var NAME = 'Y-A-T-P';
  var TOTAL = 7;
  var MOBILE_TOTAL = 9;

  var cache = {};
  var page = document.getElementById('page');
  var indicator = document.getElementById('indicator');
  var current = 1;
  var indicatorTimer = null;

  function useMobile() {
    var w = window.innerWidth, h = window.innerHeight;
    return w < 820 && h > w;
  }

  function tot() { return useMobile() ? MOBILE_TOTAL : TOTAL; }

  function pageUrl(n) {
    return NAME + (useMobile() ? '-m' : '-') + n + '.svg';
  }

  function preload(n) {
    if (n < 1 || n > tot()) return;
    var url = pageUrl(n);
    if (cache[url]) return;
    fetch(url).then(function (r) { return r.blob(); }).then(function (blob) {
      cache[url] = URL.createObjectURL(blob);
    });
  }

  function show(n) {
    var t = tot();
    if (n < 1 || n > t) return;
    current = n;
    history.replaceState(null, '', '#' + n);

    var url = pageUrl(n);
    if (cache[url]) {
      page.data = cache[url];
    } else {
      fetch(url).then(function (r) { return r.blob(); }).then(function (blob) {
        var blobUrl = URL.createObjectURL(blob);
        cache[url] = blobUrl;
        if (current === n) page.data = blobUrl;
      });
    }

    indicator.textContent = n + ' / ' + t;
    indicator.classList.add('visible');
    clearTimeout(indicatorTimer);
    indicatorTimer = setTimeout(function () { indicator.classList.remove('visible'); }, 1200);

    preload(n - 1);
    preload(n + 1);
    preload(n + 2);
  }

  function prev() { show(current - 1); }
  function next() { show(current + 1); }

  // --- Keyboard ---
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); prev(); }
    else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); next(); }
    else if (e.key === 'Home') { e.preventDefault(); show(1); }
    else if (e.key === 'End') { e.preventDefault(); show(tot()); }
  });

  // --- Click (desktop) ---
  document.getElementById('overlay').addEventListener('click', function (e) {
    e.clientX < window.innerWidth * 0.5 ? prev() : next();
  });

  // --- Touch: tap to turn, hold to flip rapidly ---
  var touchX = 0, touchY = 0, holdTimer = null, holdFired = false;

  function startHold(fn) {
    holdFired = false;
    holdTimer = setTimeout(function () {
      holdFired = true;
      fn();
      holdTimer = setInterval(fn, 150);
    }, 400);
  }

  function stopHold() {
    clearTimeout(holdTimer);
    clearInterval(holdTimer);
    holdTimer = null;
  }

  document.addEventListener('touchstart', function (e) {
    e.preventDefault();
    touchX = e.changedTouches[0].clientX;
    touchY = e.changedTouches[0].clientY;
    if (touchX < window.innerWidth * 0.5) startHold(prev);
    else startHold(next);
  }, { passive: false });

  document.addEventListener('touchmove', function (e) {
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', function (e) {
    e.preventDefault();
    stopHold();
    if (holdFired) return;
    var dx = e.changedTouches[0].clientX - touchX;
    var dy = e.changedTouches[0].clientY - touchY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      dx < 0 ? next() : prev();
      return;
    }
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
      touchX < window.innerWidth * 0.5 ? prev() : next();
    }
  }, { passive: false });

  // --- Resize ---
  window.addEventListener('resize', function () {
    var t = tot();
    if (current > t) current = t;
    show(current);
  });

  // --- Init ---
  var h = parseInt(location.hash.replace('#', ''), 10);
  current = (h >= 1 && h <= tot()) ? h : 1;
  show(current);
})();
</script>

</body>
</html>
